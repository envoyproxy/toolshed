[metadata]
name = envoy.gpg.sign
version = file: VERSION
author = Ryan Northey
author_email = ryan@synca.io
maintainer = Ryan Northey
maintainer_email = ryan@synca.io
license = Apache Software License 2.0
url = https://github.com/envoyproxy/toolshed/tree/main/py/envoy.gpg.sign
description = GPG signing util used in Envoy proxy CI
long_description = file: README.rst
classifiers =
    Development Status :: 4 - Beta
    Intended Audience :: Developers
    License :: OSI Approved :: Apache Software License
    Operating System :: OS Independent
    Programming Language :: Python
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3 :: Only
    Programming Language :: Python :: 3.12
    Programming Language :: Python :: 3.13
    Programming Language :: Python :: Implementation :: CPython
    Topic :: Software Development
    Typing :: Typed

[options]
python_requires = >=3.12
packages = find_namespace:
install_requires =
    aio.run.runner>=0.4.1
    envoy.base.utils>=0.6.3
    python-gnupg>=0.5.0
    verboselogs>=1.7

[options.extras_require]
test =
    pytest>=7.4.0
    pytest-cov
    pytest-patches>=0.1.0
lint = flake8>=6.1.0
types = mypy>=1.6.0
publish = wheel>=0.41.0

[options.package_data]
envoy.gpg.sign =
    py.typed
    rpm_macro.tmpl
envoy.gpg.identity =
    py.typed

[options.entry_points]
console_scripts =
    envoy.gpg.sign = envoy.gpg.sign:cmd

[options.packages.find]
include =
    envoy.gpg.identity
    envoy.gpg.identity.*
    envoy.gpg.sign
    envoy.gpg.sign.*
