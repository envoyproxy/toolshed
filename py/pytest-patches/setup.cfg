[metadata]
name = pytest-patches
version = file: VERSION
author = Ryan Northey
author_email = ryan@synca.io
maintainer = Ryan Northey
maintainer_email = ryan@synca.io
license = Apache Software License 2.0
url = https://github.com/envoyproxy/toolshed/tree/main/py/pytest-patches
description = A contextmanager pytest fixture for handling multiple mock patches
long_description = file: README.rst
classifiers =
    Development Status :: 4 - Beta
    Framework :: Pytest
    Intended Audience :: Developers
    License :: OSI Approved :: Apache Software License
    Operating System :: OS Independent
    Programming Language :: Python
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3 :: Only
    Programming Language :: Python :: 3.12
    Programming Language :: Python :: 3.13
    Programming Language :: Python :: Implementation :: CPython
    Topic :: Software Development :: Testing
    Typing :: Typed

[options]
python_requires = >=3.12
packages = find:
install_requires = pytest>=7.4.0

[options.extras_require]
test =
    pytest-coverage
lint = flake8>=6.1.0
types = mypy>=1.6.0
publish = wheel>=0.41.0

[options.package_data]
pytest_patches = py.typed

[options.packages.find]
include =
    pytest_patches
    pytest_patches.*
exclude =
    build.*
    tests.*
    dist.*

[options.entry_points]
pytest11 =
    patches = pytest_patches

[tool:pytest]
asyncio_default_fixture_loop_scope = function
