[metadata]
name = envoy.docs.sphinx_runner
version = file: VERSION
author = Ryan Northey
author_email = ryan@synca.io
maintainer = Ryan Northey
maintainer_email = ryan@synca.io
license = Apache Software License 2.0
url = https://github.com/envoyproxy/toolshed/tree/main/py/envoy.docs.sphinx_runner
description = Sphinx docs builder used in Envoy proxy CI
long_description = file: README.rst
classifiers =
    Development Status :: 4 - Beta
    Intended Audience :: Developers
    License :: OSI Approved :: Apache Software License
    Operating System :: OS Independent
    Programming Language :: Python
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3 :: Only
    Programming Language :: Python :: 3.12
    Programming Language :: Python :: 3.13
    Programming Language :: Python :: Implementation :: CPython
    Topic :: Software Development
    Typing :: Typed

[options]
python_requires = >=3.12
packages = find_namespace:
install_requires =
    aio.run.runner>=0.4.1
    colorama
    docutils~=0.21.0
    envoy.base.utils>=0.6.3
    packaging>=23.0
    protobuf>=5.29.5
    pygments>=2.11.1
    pyyaml>=6.0.3
    sphinx>=7.2.2
    sphinx-copybutton>=0.5.1
    sphinx-rtd-theme>=2.0.0rc2
    sphinx-tabs>=3.5.0
    sphinxcontrib-jquery>=3.0.0
    sphinxcontrib-httpdomain
    sphinxcontrib-applehelp
    sphinxcontrib-devhelp
    sphinxcontrib-htmlhelp
    sphinxcontrib-qthelp
    sphinxcontrib-serializinghtml
    sphinxext-rediraffe

[options.extras_require]
test =
    pytest>=7.4.0
    pytest-asyncio>=0.23.3
    pytest-cov
    pytest-patches>=0.1.0
lint = flake8>=6.1.0
types =
    mypy>=1.6.0
    types-docutils==0.21.0.20250715
    types-pygments

publish = wheel>=0.41.0

[options.package_data]
envoy.docs.sphinx_runner = py.typed

[options.packages.find]
include =
    envoy.docs.sphinx_runner
    envoy.docs.sphinx_runner.*

[options.entry_points]
console_scripts =
    envoy.docs.sphinx_runner = envoy.docs.sphinx_runner:cmd
