[package]
name = "toolshed-echo"
version = "0.1.0"
edition = "2021"

[dependencies]
as-any = "0.3.2"
async-trait = "0.1.87"
axum = "0.7"
clap = "4.5.31"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9.34"
tokio = { version = "1", features = ["full"] }
toolshed_runner = { path = "../runner" }
