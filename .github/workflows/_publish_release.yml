name: _publish_release

permissions:
  actions: read

on:
  workflow_call:
    secrets:
      app-id:
      app-key:
      gpg-key:
      gpg-password:

    inputs:
      artifact-workflows:
        type: string
        required: true
      artifacts:
        type: boolean
        default: false
      committer-email:
        required: true
        type: string
      committer-name:
        required: true
        type: string
      dry-run:
        default: false
        type: boolean
      event:
        default: ${{ github.event.workflow_run.event }}
        type: string
      fail-if-exists:
        default: false
        type: boolean
      filter-artifacts:
        default: .
        type: string
      name:
        required: true
        type: string
      prepare-dev:
        required: false
        type: string
      pypi-dry-run:
        default: true
        type: boolean
      pypi-publish:
        default: false
        type: boolean
      pypi-repository-url:
        default:
        type: string
      repository:
        default: ${{ github.repository }}
        type: string
      sha:
        default: ${{ github.event.workflow_run.head_sha }}
        type: string
      template-artifacts:
        type: string
        default: |
          \($name)-{artifacts,source}*
      title:
        default: ${{ github.event.workflow_run.head_commit.message }}
        type: string
      version:
        default:
        type: string
      version-file:
        required: true
        type: string
      workflows:
        type: string
        required: true


jobs:
  release:
    permissions:
      actions: read
    name: release (${{ inputs.name }})
    runs-on: ubuntu-24.04
    outputs:
      continue: ${{ steps.status.outputs.continue }}
      run-ids: ${{ steps.status.outputs.run-ids }}
      version: ${{ steps.status.outputs.version }}
    steps:
    - uses: envoyproxy/toolshed/actions/appauth@094549c1d217c1d0b28b0570431c71e8602dc0f0
      id: appauth
      name: Appauth
      if: >-
        inputs.event == 'push'
        && ! inputs.dry-run
      with:
        app_id: ${{ secrets.app-id }}
        key: ${{ secrets.app-key }}
    - id: checkout
      name: Checkout the repository
      uses: envoyproxy/toolshed/actions/github/checkout@094549c1d217c1d0b28b0570431c71e8602dc0f0
      with:
        branch: main
        committer-name: ${{ inputs.committer-name }}
        committer-email: ${{ inputs.committer-email }}
        config: |
          ref: ${{ inputs.sha }}
        pr: ${{ inputs.event == 'pull_request' && github.event.pull_request.number || '' }}
        token: ${{ steps.appauth.outputs.token }}

    - if: inputs.dry-run
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        path: temprepo
    - if: inputs.dry-run
      run: |
        cp -a temprepo/.github/workflows/prepare_bazel_dev.sh .github/workflows
        cp -a temprepo/.github/workflows/prepare_python_dev.sh .github/workflows
        rm -rf temprepo
    - name: Initialize GPG
      id: gpg
      if: >-
        inputs.artifacts
      uses: envoyproxy/toolshed/actions/gpg@094549c1d217c1d0b28b0570431c71e8602dc0f0
      with:
        gpg-key: ${{ ! inputs.dry-run && secrets.gpg-key || '' }}
        gpg-password: ${{ ! inputs.dry-run && secrets.gpg-password || '' }}
    - name: Release title (eg commit message)
      id: title
      uses: envoyproxy/toolshed/actions/jq@094549c1d217c1d0b28b0570431c71e8602dc0f0
      with:
        options: -sRr
        input: |
          ${{ inputs.title }}
        filter: |
          split("\n") | first

    - name: Publish the release
      uses: envoyproxy/toolshed/actions/github/release@094549c1d217c1d0b28b0570431c71e8602dc0f0
      id: status
      with:
        artifact-workflows: ${{ inputs.artifact-workflows }}
        artifacts: ${{ inputs.artifacts }}
        dry-run: ${{ inputs.dry-run }}
        event: ${{ inputs.event }}
        fail-if-exists: ${{ inputs.fail-if-exists }}
        filter-artifacts: ${{ inputs.filter-artifacts }}
        gpg-fingerprint: ${{ steps.gpg.outputs.fingerprint }}
        gpg-passphrase: ${{ steps.gpg.outputs.passphrase }}
        name: ${{ inputs.name }}
        prepare-dev: ${{ inputs.prepare-dev && format('{0}/{1}', github.workspace, inputs.prepare-dev) || '' }}
        repository: ${{ inputs.repository }}
        sha: ${{ inputs.sha }}
        summary: true
        template-artifacts: ${{ inputs.template-artifacts }}
        title: ${{ steps.title.outputs.value }}
        token: ${{ steps.appauth.outputs.token || github.token }}
        version: ${{ inputs.version }}
        version-file: ${{ inputs.version-file }}
        workflows: ${{ inputs.workflows }}

  # Publishes Python wheels to PyPI using OIDC Trusted Publishing.
  # Runs as a separate job so that:
  #   - The `pypi` environment is only triggered for real (non-dry-run) publishes.
  #   - id-token: write is scoped to this job only, not all release jobs.
  pypi_publish:
    needs: release
    name: PyPI publish (${{ inputs.name }})
    # Only run when this is a Python release with all required conditions met.
    if: >-
      inputs.name == 'python'
      && fromJSON(inputs.pypi-publish)
      && fromJSON(inputs.artifacts)
      && needs.release.outputs.version != ''
      && ! fromJSON(needs.release.outputs.version).is_dev
      && fromJSON(needs.release.outputs.continue)
    # Use the `pypi` environment only for real (non-dry-run) publishes.
    # For dry-runs, no environment is set to avoid triggering deployment events.
    # i.e. set `pypi` when neither dry-run nor pypi-dry-run is set.
    environment: ${{ (!fromJSON(inputs.dry-run) && !fromJSON(inputs.pypi-dry-run)) && 'pypi' || null }}
    permissions:
      actions: read
      id-token: write
    runs-on: ubuntu-24.04
    steps:
    - name: Download Python artifacts
      uses: envoyproxy/toolshed/actions/github/release/artifacts@094549c1d217c1d0b28b0570431c71e8602dc0f0
      with:
        dry-run: ${{ fromJSON(inputs.dry-run) || fromJSON(inputs.pypi-dry-run) }}
        filter-artifacts: ${{ inputs.filter-artifacts }}
        run-ids: ${{ needs.release.outputs.run-ids }}
        publish-directory: artifacts/publish
        template-artifacts: ${{ inputs.template-artifacts }}
        workflows: ${{ inputs.artifact-workflows }}
    - name: Publish python wheels to PyPI
      uses: envoyproxy/toolshed/actions/python/release/publish@094549c1d217c1d0b28b0570431c71e8602dc0f0
      with:
        dry-run: ${{ fromJSON(inputs.dry-run) || fromJSON(inputs.pypi-dry-run) }}
        packages-dir: artifacts/publish
        repository-url: ${{ inputs.pypi-repository-url }}
