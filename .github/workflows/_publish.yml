name: _publish

permissions:
  contents: read

on:
  workflow_call:
    secrets:
      app-id:
      app-key:
      dockerhub-username:
      dockerhub-password:
      gcr-key:
      gpg-key:
      gpg-password:

    inputs:
      actions-version:
        default:
        type: string
      actions-version-file:
        default: actions/VERSION.txt
        type: string
      bazel-version:
        default:
        type: string
      bazel-version-file:
        default: bazel/VERSION.txt
        type: string
      bins-version:
        default:
        type: string
      bins-version-file:
        default: BINS_VERSION.txt
        type: string
      docker-version:
        default:
        type: string
      docker-version-file:
        default: docker/build/VERSION.txt
        type: string
      committer-email:
        required: true
        type: string
      committer-name:
        required: true
        type: string
      conclusion:
        default: ${{ github.event.workflow_run.conclusion }}
        type: string
      dry-run:
        default: false
        type: boolean
      event:
        default: ${{ github.event.workflow_run.event }}
        type: string
      fail-if-exists:
        default: false
        type: boolean
      python-filter-artifacts:
        default:
        type: string
      python-version:
        default:
        type: string
      python-version-file:
        default: py/VERSION.txt
        type: string
      pypi-dry-run:
        default: false
        type: boolean
      pypi-repository-url:
        default:
        type: string
      repository:
        default: ${{ github.repository }}
        type: string
      sha:
        default: ${{ github.event.workflow_run.head_sha }}
        type: string
      title:
        default: ${{ github.event.workflow_run.head_commit.message }}
        type: string
      skip:
        type: boolean
        default: false


jobs:
  publish:
    permissions:
      actions: read
      contents: read
      id-token: write
    secrets:
      app-id: ${{ secrets.app-id }}
      app-key: ${{ secrets.app-key }}
      dockerhub-username: ${{ secrets.dockerhub-username }}
      dockerhub-password: ${{ secrets.dockerhub-password }}
      gcr-key: ${{ secrets.gcr-key }}
      gpg-key: ${{ secrets.gpg-key }}
      gpg-password: ${{ secrets.gpg-password }}
    if: >-
      inputs.conclusion == 'success'
      && ! inputs.skip
    name: ${{ matrix.name }}
    uses: ./.github/workflows/_publish_release.yml
    with:
      artifact-workflows: ${{ matrix.artifact-workflows }}
      artifacts: ${{ matrix.artifacts || false }}
      committer-email: ${{ inputs.committer-email }}
      committer-name: ${{ inputs.committer-name }}
      dry-run: ${{ inputs.dry-run }}
      event: ${{ inputs.event }}
      fail-if-exists: ${{ inputs.fail-if-exists }}
      filter-artifacts: >-
        ${{ matrix.filter-artifacts
            || '.' }}
      name: ${{ matrix.name }}
      prepare-dev: ${{ matrix.prepare-dev }}
      pypi-dry-run: ${{ inputs.pypi-dry-run || inputs.dry-run }}
      pypi-publish: ${{ matrix.pypi-publish || false }}
      pypi-repository-url: ${{ inputs.pypi-repository-url }}
      sha: ${{ inputs.sha }}
      template-artifacts: >-
        ${{ matrix.template-artifacts
            || '\($name)-{artifacts,source}*' }}
      title: ${{ inputs.title }}
      version: ${{ matrix.version }}
      version-file: ${{ matrix.version-file }}
      # Wait for all workflows to complete or else publishing
      # is repeatedly triggered
      workflows: |
        Bazel CI
        Docker CI
        Github/actions CI
        Python CI
        Rust CI
    strategy:
      fail-fast: false
      # Best not to run in parallel for real releases as it
      # can push to main and potentially conflict
      max-parallel: ${{ (! inputs.dry-run) && 1 || 0 }}
      matrix:
        include:
        - name: actions
          artifact-workflows: |
            Github/actions CI
          version: ${{ inputs.actions-version }}
          version-file: ${{ inputs.actions-version-file }}
        - name: bazel
          artifact-workflows: |
            Bazel CI
          artifacts: true
          prepare-dev: .github/workflows/prepare_bazel_dev.sh
          template-artifacts: |
            \($name)-source*
          version: ${{ inputs.bazel-version }}
          version-file: ${{ inputs.bazel-version-file }}
        - name: bins
          artifact-workflows: |
            Bazel CI
            Rust CI
          artifacts: true
          template-artifacts: |
            \($name)-artifacts*
          version: ${{ inputs.bins-version }}
          version-file: ${{ inputs.bins-version-file }}
        - name: docker
          artifact-workflows: |
            Docker CI
          artifacts: true
          template-artifacts: |
            oci-debian-*
          version: ${{ inputs.docker-version }}
          version-file: ${{ inputs.docker-version-file }}
        - name: python
          artifact-workflows: |
            Python CI
          artifacts: true
          # Exclude non-publishable test fixture package built in CI.
          filter-artifacts: |
            ${{ inputs.python-filter-artifacts
                || 'select(
                      ($key | contains(".dev") | not)
                      and ($key | test("\\.whl$|\\.tar\\.gz$"))
                      and ($key | startswith("python:toolshed_test_publish_pkg-") | not)
                    )' }}
          prepare-dev: .github/workflows/prepare_python_dev.sh
          pypi-publish: true
          template-artifacts: |
            \($name)-{artifacts,source}*
          version: ${{ inputs.python-version }}
          version-file: ${{ inputs.python-version-file }}
