name: _bazel

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      action:
        description: Bazel action (build or test)
        required: true
        type: string
      artifacts:
        description: Artifacts to upload
        required: false
        type: string
      bazel-args:
        description: Bazel args
        default:
        type: string
      rbe:
        description: Enable EngFlow RBE (appends --config=rbe when auth passes)
        type: boolean
        default: false
      bazel-mode:
        description: Bazel mode (workspace or bzlmod)
        required: true
        type: string
      bazel-path:
        description: Path to bazel workspace
        default: .
        type: string
      targets:
        description: Bazel targets
        required: true
        type: string
      upload:
        description: Upload CI artifacts
        type: boolean
        default: false


jobs:
  bazel:
    runs-on: ubuntu-24.04
    name: Bazel (${{ inputs.action }})
    permissions:
      contents: read
      packages: read
    steps:
    - uses: envoyproxy/toolshed/actions/bind-mounts@5171ddd579f53dcef432bc54e16e2d2c90864968  # actions-v0.4.13
      with:
        mounts: |
          - src: /mnt/workspace
            target: ${{ github.workspace }}
            chown: "runner:runner"
          - src: /mnt/cache
            target: /home/runner/.cache
            chown: "runner:runner"
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Setup Bazel
      uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2  # v3
    - name: Install libtinfo5
      run: |
        # Workaround for https://github.com/llvm/llvm-project/issues/75490
        curl -LO "http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb"
        sudo dpkg -i "libtinfo5_6.3-2ubuntu0.1_amd64.deb"
        rm "libtinfo5_6.3-2ubuntu0.1_amd64.deb"
        sudo apt-get -qq update
        sudo apt-get -qq install -y --no-install-recommends \
            debian-archive-keyring debootstrap qemu-user-static binfmt-support
    - name: Configure repo Bazel settings
      if: vars.TOOLSHED_CI_BAZELRC
      shell: bash
      run: |
        echo "${BAZELRC_CONTENT}" > repo.bazelrc
      working-directory: ${{ inputs.bazel-path }}
      env:
        BAZELRC_CONTENT: ${{ vars.TOOLSHED_CI_BAZELRC }}
    - name: RBE auth check
      id: rbe
      if: inputs.rbe && github.event_name == 'pull_request'
      uses: envoyproxy/toolshed/actions/github/container/auth@f3c0acc8c3799305101f5669042b388edfb070c7
      with:
        container: hello-world
    - name: Bazel targets (${{ inputs.action }}/${{ inputs.bazel-mode }})
      shell: bash
      run: >-
        exec bazel ${{ inputs.action }}
        ${{ inputs.bazel-args }}
        ${{ (steps.rbe.outputs.authorized == 'true' || github.event_name != 'pull_request') && '--config=rbe' || '' }}
        ${{ inputs.targets }}
      working-directory: ${{ inputs.bazel-path }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
    - name: Create source tarball
      id: source-tarball
      if: >-
        inputs.action == 'build'
        && inputs.bazel-path == 'bazel'
        && inputs.upload
      uses: envoyproxy/toolshed/actions/source@5171ddd579f53dcef432bc54e16e2d2c90864968  # actions-v0.4.13
      with:
        output-name: toolshed-bazel-v{version}.tar.gz
        source-path: bazel/
        transform: s,^bazel,toolshed-bazel-v{version},
        version-file: bazel/VERSION.txt
        exclude-patterns: |
          .git*
          bazel/bazel-*
    - name: Bazel source
      if: ${{ steps.source-tarball.outputs.tarball }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: bazel-source
        path: ${{ steps.source-tarball.outputs.tarball }}
        retention-days: 30
    - name: Bazel artifact paths
      id: artifact-paths
      if: >-
        inputs.action == 'build'
        && inputs.artifacts
        && inputs.upload
      uses: envoyproxy/toolshed/actions/jq@5171ddd579f53dcef432bc54e16e2d2c90864968  # actions-v0.4.13
      with:
        input: ${{ inputs.artifacts }}
        input-format: text
        options: -Rr
        filter: |
          select(length > 0)
          | "${{ inputs.bazel-path }}/bazel-bin/\(.)"
    - name: Bazel artifacts
      if: ${{ inputs.upload && (steps.artifact-paths.outputs.value || steps.source-tarball.outputs.tarball) }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: bazel-artifacts
        path: |
          ${{ steps.artifact-paths.outputs.value }}
        retention-days: 30

  xcompile-x86-to-arm:
    if: inputs.action == 'test'
    runs-on: ubuntu-24.04
    name: Bazel (x-compile x86 -> arm)
    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Setup Bazel
      uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2  # v3
    - name: Install libtinfo5
      run: |
        # Workaround for https://github.com/llvm/llvm-project/issues/75490
        curl -LO "http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb"
        sudo dpkg -i "libtinfo5_6.3-2ubuntu0.1_amd64.deb"
        rm "libtinfo5_6.3-2ubuntu0.1_amd64.deb"
        sudo apt-get -qq update
        sudo apt-get -qq install -y --no-install-recommends \
            debian-archive-keyring debootstrap qemu-user-static binfmt-support
    - name: Configure repo Bazel settings
      if: vars.TOOLSHED_CI_BAZELRC
      shell: bash
      run: |
        echo "${BAZELRC_CONTENT}" > repo.bazelrc
      working-directory: ${{ inputs.bazel-path }}
      env:
        BAZELRC_CONTENT: ${{ vars.TOOLSHED_CI_BAZELRC }}
    - name: Cross-compile test (x86_64 -> aarch64/${{ inputs.bazel-mode }})
      run: |
        exec bazel test ${{ inputs.bazel-args }} \
          --platforms=@toolchains_llvm//platforms:linux-aarch64 \
          //compile/test:cross_compile_aarch64_test \
          //compile/test:cross_compile_aarch64_unwind_test
      working-directory: ${{ inputs.bazel-path }}
    - name: Cross-compile test (x86_64 -> aarch64/${{ inputs.bazel-mode }})
      run: |
        exec bazel test ${{ inputs.bazel-args }} \
          --platforms=@toolchains_llvm//platforms:linux-aarch64 \
          --@toolchains_llvm//toolchain/config:libunwind=False \
          //compile/test:cross_compile_aarch64_no_unwind_test
      working-directory: ${{ inputs.bazel-path }}

  build-macos-sysroot:
    if: inputs.action == 'build' && inputs.upload
    runs-on: macos-14
    name: Build macOS sysroot
    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Build macOS arm64 sysroot
      run: bash bazel/sysroot/build_macos_sysroot_ci.sh
    - name: Build darwin libcxx
      run: |
        LLVM_VERSION=18.1.8
        SYSROOT=$(xcrun --show-sdk-path --sdk macosx)

        # Download LLVM source
        curl -L -o /tmp/llvm-source.tar.xz \
          "https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/llvm-project-${LLVM_VERSION}.src.tar.xz"
        mkdir -p /tmp/llvm-source
        tar -xf /tmp/llvm-source.tar.xz -C /tmp/llvm-source --strip-components=1

        # Build libc++ for darwin arm64
        cmake -G Ninja -S /tmp/llvm-source/runtimes -B /tmp/libcxx-build \
          -DCMAKE_C_COMPILER=$(xcrun -f clang) \
          -DCMAKE_CXX_COMPILER=$(xcrun -f clang++) \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_SYSROOT="$SYSROOT" \
          -DCMAKE_INSTALL_PREFIX=/tmp/libcxx-install \
          -DLLVM_ENABLE_RUNTIMES="libcxx;libcxxabi;libunwind" \
          -DLIBCXX_ENABLE_SHARED=ON \
          -DLIBCXX_ENABLE_STATIC=OFF \
          -DLIBCXXABI_ENABLE_SHARED=ON \
          -DLIBCXXABI_ENABLE_STATIC=OFF \
          -DLIBCXX_CXX_ABI=libcxxabi \
          -DLIBCXXABI_USE_LLVM_UNWINDER=ON \
          -DCMAKE_BUILD_TYPE=Release

        ninja -C /tmp/libcxx-build install-cxx install-cxxabi

        # Package
        mkdir -p /tmp/libcxx-darwin/{include,lib}
        cp /tmp/libcxx-install/include/c++/v1/__config_site /tmp/libcxx-darwin/include/
        cp -a /tmp/libcxx-install/lib/libc++*.dylib /tmp/libcxx-darwin/lib/

        # Patch install names so binaries link against /usr/lib/ (system libc++)
        # instead of @rpath/ which requires LC_RPATH entries at runtime.
        install_name_tool -id /usr/lib/libc++.1.dylib /tmp/libcxx-darwin/lib/libc++.1.dylib
        install_name_tool -id /usr/lib/libc++abi.dylib /tmp/libcxx-darwin/lib/libc++abi.1.dylib

        tar -cJf libcxx-llvm${LLVM_VERSION}-darwin-aarch64.tar.xz -C /tmp/libcxx-darwin .

        SHA=$(shasum -a 256 libcxx-llvm${LLVM_VERSION}-darwin-aarch64.tar.xz | cut -d' ' -f1)
        echo "SHA256: $SHA"
    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: macos-sysroot-artifacts
        path: |
          sysroot-macos-arm64.tar.xz
          libcxx-llvm*-darwin-aarch64.tar.xz
        retention-days: 30

  xcompile-arm-to-x86:
    if: inputs.action == 'test'
    runs-on: ubuntu-24.04-arm
    name: Bazel (x-compile arm -> x86)
    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Setup Bazel
      uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2  # v3
    - name: Install libtinfo5
      run: |
        # Workaround for https://github.com/llvm/llvm-project/issues/75490
        curl -LO "http://ports.ubuntu.com/ubuntu-ports/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_arm64.deb"
        sudo dpkg -i "libtinfo5_6.3-2ubuntu0.1_arm64.deb"
        rm "libtinfo5_6.3-2ubuntu0.1_arm64.deb"
        sudo apt-get -qq update
        sudo apt-get -qq install -y --no-install-recommends \
            debian-archive-keyring debootstrap qemu-user-static binfmt-support
    - name: Cross-compile test (aarch64 -> x86_64/${{ inputs.bazel-mode }})
      run: |
        exec bazel test ${{ inputs.bazel-args }} \
          --platforms=@toolchains_llvm//platforms:linux-x86_64 \
          //compile/test:cross_compile_x86_64_test \
          //compile/test:cross_compile_x86_64_unwind_test
      working-directory: ${{ inputs.bazel-path }}
    - name: Cross-compile test (x86_64 -> x86_64/${{ inputs.bazel-mode }})
      run: |
        exec bazel test ${{ inputs.bazel-args }} \
          --platforms=@toolchains_llvm//platforms:linux-x86_64 \
          --@toolchains_llvm//toolchain/config:libunwind=False \
          //compile/test:cross_compile_x86_64_no_unwind_test
      working-directory: ${{ inputs.bazel-path }}
