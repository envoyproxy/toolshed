  artifact-pattern: oci-debian-{arch}/envoy-build-devtools-{version}-{arch}.tar
# docker
- name: envoy-build
  tag: docker-{version}
  registry: docker.io/envoyproxy
  architectures:
  - amd64
  - arm64
  artifact-pattern: oci-debian-{arch}/envoy-build-docker-{version}-{arch}.tar
# test
- name: envoy-build
  tag: test-{version}
  registry: docker.io/envoyproxy
  architectures:
  - amd64
  - arm64
  artifact-pattern: oci-debian-{arch}/envoy-build-test-{version}-{arch}.tar
# mobile (amd64 only)
- name: envoy-build
  tag: mobile-{version}
  registry: docker.io/envoyproxy
  architectures:
  - amd64
  artifact-pattern: oci-debian-{arch}/envoy-build-mobile-{version}-{arch}.tar
