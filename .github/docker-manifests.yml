manifests:
# worker
- name: envoy-build
  tag: worker-{version}
  registry: docker.io/envoyproxy
  architectures:
  - amd64
  - arm64
  artifact-pattern: oci-debian-{arch}/envoy-build-worker-{version}-{arch}.tar
# worker (gcr)
- name: envoy-build
  tag: worker-{version}
  registry: gcr.io/envoy-ci
  architectures:
  - amd64
  - arm64
  artifact-pattern: oci-debian-{arch}/envoy-build-worker-{version}-{arch}.tar
# ci
- name: envoy-build
  tag: ci-{version}
  registry: docker.io/envoyproxy
  architectures:
  - amd64
  - arm64
  artifact-pattern: oci-debian-{arch}/envoy-build-ci-{version}-{arch}.tar
# gcc
- name: envoy-build
  tag: gcc-{version}
  registry: docker.io/envoyproxy
  architectures:
  - amd64
  - arm64
  artifact-pattern: oci-debian-{arch}/envoy-build-gcc-{version}-{arch}.tar
# gcc (gcr)
- name: envoy-build
  tag: gcc-{version}
  registry: gcr.io/envoy-ci
  architectures:
  - amd64
  - arm64
  artifact-pattern: oci-debian-{arch}/envoy-build-gcc-{version}-{arch}.tar
# devtools
- name: envoy-build
  tag: devtools-{version}
  registry: docker.io/envoyproxy
  architectures:
  - amd64
