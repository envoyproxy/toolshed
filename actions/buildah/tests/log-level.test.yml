uses: ./actions/buildah
id: buildah
with:
  operations: |
    [
      {"command": "manifest", "args": ["create", "foo"]}
    ]

before:
- shell: bash
  run: |
    rm -f /tmp/buildah-mock.state
    echo "BUILDAH_LOG_LEVEL=debug" >> "$GITHUB_ENV"

after:
- shell: bash
  run: |
    . "${ACTION_TEST_PATH}/test_fun.sh"
    test_mock_call_count 2
    test_mock_log_contains "buildah --log-level debug manifest create foo"
