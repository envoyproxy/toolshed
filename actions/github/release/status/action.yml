inputs:
  name:
    type: string
    required: true
  repository:
    type: string
    default: ${{ github.repository }}
  sha:
    type: string
    required: true
  title:
    type: string
    required: true
  template-status:
    type: string
    default: |
      ## Publish: \(.name) \($release_info)

      ### \(.title)

  token:
    type: string
    default: ${{ github.token }}
    description: GitHub token used to dispatch missing workflows (best-effort)
  version:
    type: string
    default:
  version-file:
    type: string
    required: true
  workflows:
    type: string
    required: true

outputs:
  continue:
    value: ${{ steps.afterall.outputs.continue }}
  run-ids:
    value: ${{ steps.afterall.outputs.run-ids }}
  version:
    value: ${{ steps.version.outputs.version }}


runs:
  using: composite
  steps:
  - name: Check all workflows ran
    id: afterall
    uses: envoyproxy/toolshed/actions/github/afterall@7f2aff965c314c8a80a09a48f61552b1a3337af1
    with:
      sha: ${{ inputs.sha }}
      workflows: ${{ inputs.workflows }}
      repo: ${{ inputs.repository }}
  - name: Version info
    id: version
    uses: envoyproxy/toolshed/actions/version@7f2aff965c314c8a80a09a48f61552b1a3337af1
    with:
      version: ${{ inputs.version }}
      version-file: ${{ inputs.version-file }}
  - name: Status summary title
    id: status-summary-title
    uses: envoyproxy/toolshed/actions/jq@7f2aff965c314c8a80a09a48f61552b1a3337af1
    with:
      input: |
        name: ${{ inputs.name }}
        title: >-
          ${{ inputs.title }}
        version: ${{ steps.version.outputs.version }}
      input-format: yaml
      options: -r
      output-path: GITHUB_STEP_SUMMARY
      filter: |
        .
        | (if .version.is_dev then ""
           else "(release: \(.name)-v\(.version.version))"
           end) as $release_info
        | "${{ inputs.template-status }}"
  - name: Versions info
    uses: envoyproxy/toolshed/actions/json/table@7f2aff965c314c8a80a09a48f61552b1a3337af1
    with:
      append: true
      output-path: GITHUB_STEP_SUMMARY
      collapse: false
      input: |
        continue: ${{ steps.afterall.outputs.continue }}
        name: ${{ inputs.name }}
        repository: ${{ inputs.repository }}
        sha: ${{ inputs.sha }}
        version: ${{ steps.version.outputs.version }}
      headers:
      input-format: yaml
      filter: |
        .
        | (if .version.is_dev then ""
           else " **(RELEASE)**"
           end) as $release
        | ("[\(.sha[0:7])](https://github.com/\(.repository)/commit/\(.sha))") as $commit
        | {
            "\(.name) version": "\(.version.version)\($release)",
            "commit": "\($commit)",
            "continue": .continue,
          }
  - name: Generate workflow status table
    uses: envoyproxy/toolshed/actions/json/table@7f2aff965c314c8a80a09a48f61552b1a3337af1
    with:
      title: Required Workflows Status
      append: true
      output-path: GITHUB_STEP_SUMMARY
      collapse-open: ${{ ! fromJSON(steps.afterall.outputs.continue) }}
      headers: |
        Workflow
        Status/conclusion
      input: |
        ${{ steps.afterall.outputs.status }}
      filter: |
        . as $data
        | (.status | fromjson) as $status
        | ($data["run-ids"] | fromjson) as $runIds
        | "${{ inputs.workflows }}" | split("\n") | map(select(length > 0)) as $workflows
        | ${{ toJSON(inputs.repository) }} as $repo
        | $workflows
        | map(
            . as $wf
            | if $status[$wf] then
                $status[$wf] as $st
                | ($st.conclusion // "pending") as $conclusion
                | {key: "[\($wf) (#\($st.id))](https://github.com/\($repo)/actions/runs/\($st.id))",
                   value: "`\($st.status)`/`\($conclusion)`"}
              else
                {key: $wf, value: "🚫 missing"}
              end
          )
        | from_entries
  - name: Fail if non-dev release cannot proceed
    if: >-
      ! fromJSON(steps.afterall.outputs.continue)
      && ! fromJSON(steps.version.outputs.version).is_dev
    shell: bash
    env:
      GH_TOKEN: ${{ inputs.token }}
      AFTERALL_STATUS: ${{ steps.afterall.outputs.status }}
      WORKFLOWS: ${{ inputs.workflows }}
      REPOSITORY: ${{ inputs.repository }}
      SHA: ${{ inputs.sha }}
      RELEASE_NAME: ${{ inputs.name }}
      VERSION_JSON: ${{ steps.version.outputs.version }}
    run: |
      WF_STATUS_OBJ=$(echo "$AFTERALL_STATUS" | jq -r '.status | fromjson')
      VERSION=$(echo "$VERSION_JSON" | jq -r '.version')
      SHORT_SHA="${SHA:0:8}"

      MISSING=()
      PROBLEMS=()

      while IFS= read -r wf; do
        [[ -z "$wf" ]] && continue
        if echo "$WF_STATUS_OBJ" | jq -e --arg n "$wf" '.[$n]' > /dev/null 2>&1; then
          WF_RUN=$(echo "$WF_STATUS_OBJ" | jq -r --arg n "$wf" '.[$n]')
          WF_STATUS=$(echo "$WF_RUN" | jq -r '.status')
          WF_CONCLUSION=$(echo "$WF_RUN" | jq -r '.conclusion // empty')
          if [[ "$WF_STATUS" != "completed" ]]; then
            PROBLEMS+=("$wf ($WF_STATUS)")
          elif [[ "$WF_CONCLUSION" != "success" ]]; then
            PROBLEMS+=("$wf ($WF_CONCLUSION)")
          fi
        else
          MISSING+=("$wf")
          PROBLEMS+=("$wf (no run found)")
        fi
      done <<< "$WORKFLOWS"

      # Dispatch missing workflows — best-effort so the next publish event
      # can auto-recover once the dispatched runs complete.
      for wf in "${MISSING[@]}"; do
        echo "::notice::Attempting to dispatch missing workflow '$wf' for repo $REPOSITORY ref main"
        if gh workflow run "$wf" --ref main --repo "$REPOSITORY"; then
          echo "::notice::Dispatched workflow '$wf' — publish will retry when it completes"
        else
          echo "::warning::Could not dispatch workflow '$wf'" \
            "(token may lack workflow:write, or no workflow_dispatch trigger)" \
            "— manual retry required"
        fi
      done

      DETAIL="${PROBLEMS[*]}"
      # Join with ', ' using parameter expansion
      DETAIL=$(printf '%s, ' "${PROBLEMS[@]}")
      DETAIL="${DETAIL%, }"
      MSG="Cannot publish non-dev release ${RELEASE_NAME}-v${VERSION}"
      MSG+=" for ${SHORT_SHA}: required workflow(s) missing or unsuccessful: ${DETAIL}"
      echo "::error::${MSG}"
      exit 1
