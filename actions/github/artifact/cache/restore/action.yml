inputs:
  id:
    type: string
    required: false
  name:
    type: string
    required: true
  path:
    type: string
    required: true
  repository:
    type: string
    required: true
    default: ${{ github.repository }}
  token:
    # requires: `actions: read`
    type: string
    required: true
    default: ${{ github.token }}
  wf-path:
    type: string
    required: true
  max-retries:
    type: number
    required: false
    default: 3
  retry-delay:
    type: number
    required: false
    default: 10


runs:
  using: composite
  steps:
  - name: Find artifact cache
    if: >-
      ! inputs.id
    id: cache-id
    uses: envoyproxy/toolshed/actions/github/artifact/cache/id@8b0c0f9ec9dacf86f092bdfe6c917c48e51286c2
    with:
      name: ${{ inputs.name }}
      token: ${{ inputs.token }}
      wf-path: ${{ inputs.wf-path }}
  - name: Restore artifact cache
    if: |
      inputs.id
      || steps.cache-id.outputs.id
    shell: bash
    run: |
      for attempt in $(seq 1 "$MAX_RETRIES"); do
          echo "Attempt $attempt of $MAX_RETRIES"
          if gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
              | tar --warning=no-timestamp \
                    --keep-directory-symlink \
                    -xI unzstd \
                    -f - \
                    -C ${OUTPUT_PATH}; then
              echo "Cache restored successfully"
              exit 0
          fi
          if [[ "$attempt" -lt "$MAX_RETRIES" ]]; then
              echo "::warning::Attempt $attempt failed, retrying in ${RETRY_DELAY}s..."
              find "${OUTPUT_PATH:?}" -mindepth 1 -delete
              sleep "$RETRY_DELAY"
          fi
          RETRY_DELAY=$((RETRY_DELAY * 2))
      done
      echo "::error::Failed to restore artifact cache after $MAX_RETRIES attempts"
      exit 1
    env:
      GH_TOKEN: ${{ inputs.token }}
      ARTIFACT_ID: ${{ inputs.id || steps.cache-id.outputs.id }}
      OUTPUT_PATH: ${{ inputs.path }}
      REPOSITORY: ${{ inputs.repository }}
      MAX_RETRIES: ${{ inputs.max-retries }}
      RETRY_DELAY: ${{ inputs.retry-delay }}
