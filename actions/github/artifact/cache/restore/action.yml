inputs:
  id:
    type: string
    required: false
  max-retry:
    required: true
    default: 3
  name:
    type: string
    required: true
  path:
    type: string
    required: true
  repository:
    type: string
    required: true
    default: ${{ github.repository }}
  token:
    # requires: `actions: read`
    type: string
    required: true
    default: ${{ github.token }}
  wf-path:
    type: string
    required: true


runs:
  using: composite
  steps:
  - name: Find artifact cache
    if: >-
      ! inputs.id
    id: cache-id
    uses: envoyproxy/toolshed/actions/github/artifact/cache/id@9bf96c43c2c47a3763d19069515170c828a69ee7
    with:
      name: ${{ inputs.name }}
      token: ${{ inputs.token }}
      wf-path: ${{ inputs.wf-path }}
  - name: Restore artifact cache
    if: |
      inputs.id
      || steps.cache-id.outputs.id
    shell: bash
    run: |
      set -o pipefail
      attempt=0
      while :; do
          attempt=$((attempt + 1))
          if gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
              | tar --warning=no-timestamp \
                    --keep-directory-symlink \
                    -xI unzstd \
                    -f - \
                    -C "${OUTPUT_PATH}"; then
              break
          fi
          if [[ "$attempt" -ge "$MAX_RETRY" ]]; then
              echo "::error::Artifact restore failed after ${attempt} attempts" >&2
              exit 2
          fi
          failed="${OUTPUT_PATH}.failed.$$.${attempt}"
          mv "${OUTPUT_PATH}" "${failed}"
          mkdir -p "${OUTPUT_PATH}"
          rm -rf "${failed}" &
          sleep $((2 ** attempt))
      done
    env:
      GH_TOKEN: ${{ inputs.token }}
      ARTIFACT_ID: ${{ inputs.id || steps.cache-id.outputs.id }}
      MAX_RETRY: ${{ inputs.max-retry }}
      OUTPUT_PATH: ${{ inputs.path }}
      REPOSITORY: ${{ inputs.repository }}
