name: 'Appauth'
description: 'Appauth Github workflow.'
author: 'phlax'
inputs:
  key:
    description: >
      App key for dispatch.
  app_id:
    type: number
    description: >
      App ID for dispatch.
  installation_id:
    type: number
    description: >
      App installation ID for dispatch.
  token:
    type: string
    description: |
      Token to use if no key/id supplied.

  token-ok:
    type: boolean
    default: false
    description: |
      Dont warn if token used.

  retries:
    type: number
    default: 5
    description: |
      Maximum number of retry attempts for transient errors (in addition to the initial attempt).
      Set to 0 to disable retries.

  retry-base-delay-ms:
    type: number
    default: 1000
    description: |
      Base delay in milliseconds for exponential backoff between retries.

  retry-max-delay-ms:
    type: number
    default: 15000
    description: |
      Maximum delay in milliseconds for a single backoff interval.

runs:
  using: node24
  main: '../../js/appauth/dist/index.js'
