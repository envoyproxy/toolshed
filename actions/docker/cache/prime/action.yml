inputs:
  image-tag:
    type: string
    required: true
  key-suffix:
    type: string
    default:
  lock-id:
    type: string
  lock-repository:
    type: string
    default: ${{ github.repository }}
  lock-token:
    type: string

outputs:
  cached:
    value: ${{ steps.prime.outputs.cached }}


runs:
  using: "composite"
  steps:
  - uses: envoyproxy/toolshed/actions/cache/prime@444b7d08e6a5d81780c458c9ad9bb0305939f7ba
    id: prime
    with:
      key: ${{ inputs.image-tag }}${{ inputs.key-suffix }}
      lock-id: ${{ inputs.lock-id }}
      lock-token: ${{ inputs.lock-token }}
      lock-repository: ${{ inputs.lock-repository }}
      command: |
        systemctl stop docker docker.socket
        mv /var/lib/docker /var/lib/docker.orig
        mkdir /var/lib/docker
        systemctl start docker
        docker pull "$IMAGE_TAG"
        systemctl stop docker docker.socket
        tar cf - -C /var/lib/docker . | zstd - -T0 -o docker.tar.zst
      sudo-preserve-env: IMAGE_TAG
    env:
      IMAGE_TAG: ${{ inputs.image-tag }}
